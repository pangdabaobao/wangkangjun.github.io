<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>网页设计作业</title>
    <style>
      body {
        font-family: "微软雅黑", sans-serif;
        line-height: 1.8;
        margin: 20px;
      }

      h1 {
        font-size: 30px;
        text-align: center;
        font-weight: bold;
        color: #007acc;
        line-height: 1.8;
      }

      .blue-line {
        height: 3px;
        background-color: #007acc;
        margin: 10px 0 20px;
      }

      .subtitle {
        font-size: 22px;
        font-weight: bold;
        color: #333;
        line-height: 1.8;
      }

      #content {
        font-size: 16px;
        color: #333;
        text-indent: 2em;
        line-height: 1.8;
      }

      ul {
        font-size: 16px;
        color: #333;
        line-height: 1.8;
        padding-left: 2em;
        list-style: none;
      }

      ul li {
        position: relative;
        padding-left: 15px;
      }

      ul li::before {
        content: "";
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 10px;
        height: 10px;
        background: url("圆点.png") no-repeat center center;
        background-size: 10px 10px;
      }

      .footer-text {
        font-size: 16px;
        color: #333;
        text-indent: 2em;
        line-height: 1.8;
      }

      .highlight {
        font-weight: bold;
        background-color: #f4d805;
        padding: 2px 4px;
      }
    </style>
  </head>
  <body>
    <h1>Claude Code —— 智能AI编程助手</h1>
    <div class="blue-line"></div>

    <h2 class="subtitle">什么是 Claude Code?</h2>
    <p id="content">
      Claude Code 是由 Anthropic 公司推出的<span class="highlight"
        >AI编程助手</span
      >，可以帮助初学者快速写代码、查错误、学逻辑，非常适合新手学习。
    </p>

    <h2 class="subtitle">Claude Code 核心优势</h2>
    <ul>
      <li>支持HTML、CSS、JavaScript、Python等多种语言</li>
      <li>智能代码提示与自动修复</li>
      <li>代码逻辑详细讲解</li>
      <li>免费使用基础功能</li>
      <li>界面简洁、容易上手</li>
    </ul>

    <p class="footer-text">
      如果你正在学习编程，<span class="highlight">Claude Code</span>
      会是你学习路上非常好的帮手，随时解答你的编程问题。
    </p>
  </body>
</html>
