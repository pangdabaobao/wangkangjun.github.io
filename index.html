<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人主页</title>
    <style>
      /* 页面整体样式 */
      body {
        margin: 0;
        padding: 0;
        height: 100vh; /* 占满整个视口高度 */
        display: flex;
        justify-content: center; /* 水平居中 */
        align-items: center; /* 垂直居中 */
        font-family: "Microsoft YaHei", sans-serif;
        background-color: #f5f5f5; /* 浅灰色背景，突出黑框 */
      }

      /* 左上角学号样式 */
      .student-id {
        position: absolute;
        top: 20px;
        left: 30px;
        font-size: 18px;
        font-weight: bold;
        color: #333;
      }

      /* 中间黑框样式 */
      .black-box {
        width: 50vw; /* 视口宽度的 50% */
        height: 50vh; /* 视口高度的 50% */
        border: 4px solid black; /* 黑色边框 */
        background-color: white; /* 框内背景色 */
        box-sizing: border-box;
        padding: 20px;

        /* 让框内的内容也居中显示 */
        display: flex;
        flex-direction: column;
        justify-content: flex-start; /* 改为从上到下排列 */
        align-items: center;
        gap: 10px;
        overflow-y: auto; /* 如果链接太多，允许内部滚动 */
      }

      /* 链接按钮样式 */
      .link-item {
        text-decoration: none;
        color: #007bff;
        font-size: 16px;
        padding: 8px 16px;
        border: 1px solid #ddd;
        border-radius: 5px;
        transition: all 0.3s ease;
        width: 80%;
        text-align: center;
        display: block; /* 默认显示 */
      }

      .link-item:hover {
        background-color: #007bff;
        color: white;
      }

      /* 添加按钮样式 */
      #add-btn {
        margin-top: 10px;
        padding: 8px 16px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
      }

      #add-btn:hover {
        background-color: #218838;
      }

      #add-btn:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <!-- 左上角学号 -->
    <div class="student-id">学号:25111090102</div>

    <!-- 正中黑框 -->
    <div class="black-box" id="link-container">
      <!-- 链接将动态添加到这里 -->

      <!-- 添加链接按钮 -->
      <button id="add-btn">+ 添加新链接 (剩余 20)</button>
    </div>

    <script>
      const maxLinks = 20;
      let currentCount = 0;
      const container = document.getElementById("link-container");
      const addBtn = document.getElementById("add-btn");

      // 更新按钮文字
      function updateButtonText() {
        addBtn.innerText = `+ 添加新链接 (剩余 ${maxLinks - currentCount})`;
        if (currentCount >= maxLinks) {
          addBtn.disabled = true;
          addBtn.innerText = "已达最大数量 (20)";
        }
      }

      // 点击添加按钮
      addBtn.addEventListener("click", () => {
        if (currentCount >= maxLinks) return;

        // 弹出输入框
        const url = prompt("请输入链接地址 (例如: https://www.baidu.com):");

        if (url) {
          // 如果用户输入了内容
          createLinkElement(url);
        }
      });

      // 创建链接元素
      function createLinkElement(url) {
        // 确保URL有协议头
        let finalUrl = url;
        if (!url.startsWith("http://") && !url.startsWith("https://")) {
          finalUrl = "https://" + url;
        }

        // 创建 a 标签
        const link = document.createElement("a");
        link.href = finalUrl;
        link.className = "link-item";
        link.innerText = `链接 ${currentCount + 1}`; // 默认显示文字
        link.target = "_blank"; // 在新标签页打开

        // 允许用户修改显示文字
        const newName = prompt("请输入链接显示名称 (可选，直接回车使用默认):");
        if (newName) {
          link.innerText = newName;
        }

        // 插入到按钮之前
        container.insertBefore(link, addBtn);

        currentCount++;
        updateButtonText();
      }
    </script>
  </body>
</html>
