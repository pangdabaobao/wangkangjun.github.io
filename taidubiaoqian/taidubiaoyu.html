<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>如何培养认真严谨的习惯</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #ffffff;
        font-family: "Microsoft YaHei", sans-serif;
        padding: 40px 60px;
      }
      h1 {
        text-align: center;
        font-size: 28px;
        color: #555;
        margin-bottom: 10px;
      }
      .meta {
        text-align: center;
        color: #101dd6;
        font-size: 14px;
        margin-bottom: 40px;
      }
      .content-wrapper {
        display: flex;
        align-items: flex-start;
        gap: 50px;
      }
      .left-img-box {
        width: 500px;
        height: 140px;
      }
      .right-list {
        flex: 1;
      }
      .item-row {
        display: flex;
        align-items: center;
        white-space: nowrap;
        font-size: 15px;
        margin-bottom: 18px;
      }
      .icon-box {
        width: 20px;
        height: 20px;
        margin-right: 12px;
        flex-shrink: 0;
      }
      .text-content {
        color: #333;
      }
      .highlight {
        color: #e74c3c;
      }
      .title-blue {
        color: #3498db;
      }
    </style>
  </head>
  <body>
    <h1>如何培养<span class="title-blue">认真严谨</span>的习惯</h1>
    <div class="meta">时间:2022年02月21日17时26分 来源:思政教育</div>

    <div class="content-wrapper">
      <div class="left-img-box">
        <img
          src="态度标语.jpg"
          alt="标语图"
          width="110%"
          height="110%"
          style="object-fit: contain"
        />
      </div>

      <div class="right-list">
        <div class="item-row">
          <div class="icon-box">
            <img
              src="star.png"
              alt="列表图标"
              width="20"
              height="20"
              style="display: block"
            />
          </div>
          <div class="text-content">
            <span class="highlight">反复确认</span
            >，做任何事情都要照顾到每一个细节并反复确认，<span class="highlight"
              >要有一种能在脑子里“虚拟”整个事件过程的能力</span
            >，确保所有的节点都正常。
          </div>
        </div>
        <div class="item-row">
          <div class="icon-box">
            <img
              src="star.png"
              alt="列表图标"
              width="20"
              height="20"
              style="display: block"
            />
          </div>
          <div class="text-content">
            想尽办法<span class="highlight">努力让不可能变为可能</span
            >，只有用全力做了，才算是努力。
          </div>
        </div>

        <div class="item-row">
          <div class="icon-box">
            <img
              src="star.png"
              alt="列表图标"
              width="20"
              height="20"
              style="display: block"
            />
          </div>
          <div class="text-content">
            结果导向，<span class="highlight"
              >一切以结果为导向，任何事情都是你的名片</span
            >，还要思考你的结果和过程是否满足所有和你配合的人的需求。
          </div>
        </div>

        <div class="item-row">
          <div class="icon-box">
            <img
              src="star.png"
              alt="列表图标"
              width="20"
              height="20"
              style="display: block"
            />
          </div>
          <div class="text-content">
            学会假设，<span class="highlight"
              >了解周围比你强的人，观察他们的做事方法，</span
            >遇到让自己束手无策的时候，把自己虚拟成他的样子，想想他会怎么做。
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
